{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join ResumeAI to track and optimize your resumes</p>

        {% if error %}
            <div class="alert-error" id="errorBox">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorMessage">{{ error }}</span>
            </div>
        {% else %}
            <div class="alert-error" id="errorBox" style="display: none;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorMessage"></span>
            </div>
        {% endif %}

        <form id="registerForm" action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Alex Applicant" required minlength="2">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="e.g. alex@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn"><i class="fa-solid fa-user-plus"></i> Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        
        if (password !== confirmPassword) {
            e.preventDefault();
            errorMessage.textContent = 'Passwords do not match.';
            errorBox.style.display = 'flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>
{% endblock %}
